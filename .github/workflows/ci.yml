name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build app
        run: swift build --product "Claude Code Switcher"

      - name: Run test runner
        run: swift run SettingsDocumentTestRunner
